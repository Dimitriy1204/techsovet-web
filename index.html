<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ТехСовет - AI-консультант</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .header {
            background: #2563eb;
            color: white;
            padding: 24px;
            text-align: center;
        }
        .header h1 {
            font-size: 28px;
            margin-bottom: 8px;
        }
        .header p {
            opacity: 0.9;
            font-size: 14px;
        }
        .chat-container {
            height: 500px;
            overflow-y: auto;
            padding: 24px;
            background: #f8fafc;
        }
        .message {
            margin-bottom: 16px;
            display: flex;
            flex-direction: column;
        }
        .message.user {
            align-items: flex-end;
        }
        .message.ai {
            align-items: flex-start;
        }
        .message-bubble {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 12px;
            word-wrap: break-word;
        }
        .message.user .message-bubble {
            background: #2563eb;
            color: white;
            border-bottom-right-radius: 4px;
        }
        .message.ai .message-bubble {
            background: white;
            color: #1e293b;
            border: 1px solid #e2e8f0;
            border-bottom-left-radius: 4px;
        }
        .message-label {
            font-size: 12px;
            color: #64748b;
            margin-bottom: 4px;
            font-weight: 600;
        }
        .input-container {
            padding: 24px;
            background: white;
            border-top: 1px solid #e2e8f0;
        }
        .input-wrapper {
            display: flex;
            gap: 12px;
        }
        #messageInput {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 15px;
            resize: none;
            min-height: 50px;
            font-family: inherit;
        }
        #messageInput:focus {
            outline: none;
            border-color: #2563eb;
        }
        #sendButton {
            padding: 12px 24px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        #sendButton:hover {
            background: #1d4ed8;
        }
        #sendButton:disabled {
            background: #94a3b8;
            cursor: not-allowed;
        }
        .settings {
            padding: 16px 24px;
            background: #f1f5f9;
            border-top: 1px solid #e2e8f0;
        }
        .settings summary {
            cursor: pointer;
            font-weight: 600;
            color: #475569;
            font-size: 14px;
        }
        .settings-content {
            margin-top: 16px;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 12px;
        }
        .setting-item label {
            display: block;
            font-size: 12px;
            color: #64748b;
            margin-bottom: 4px;
            font-weight: 600;
        }
        .setting-item input, .setting-item select {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 14px;
        }
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .error {
            background: #fee2e2;
            color: #dc2626;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 16px;
            border-left: 4px solid #dc2626;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 ТехСовет</h1>
            <p>AI-консультант для технических вопросов</p>
        </div>
        
        <div class="chat-container" id="chatContainer">
            <div class="message ai">
                <div class="message-label"> ТехСовет</div>
                <div class="message-bubble">
                    Привет! Я ТехСовет - AI-консультант. Задайте мне любой технический вопрос, и я помогу вам с расчетами, анализом или поиском информации!
                </div>
            </div>
        </div>

        <div class="input-container">
            <div class="input-wrapper">
                <textarea 
                    id="messageInput" 
                    placeholder="Задайте ваш технический вопрос здесь... (Enter — отправить, Shift+Enter — новая строка)"
                    rows="2"
                ></textarea>
                <button id="sendButton">🚀 Отправить</button>
            </div>
        </div>

        <div class="settings">
            <details>
                <summary>⚙️ Настройки (нажмите для раскрытия)</summary>
                <div class="settings-content">
                    <div class="setting-item">
                        <label>Режим ответа</label>
                        <select id="responseMode">
                            <option value="detailed">Развёрнутый</option>
                            <option value="short">Краткий</option>
                        </select>
                    </div>
                    <div class="setting-item">
                        <label>User ID (опционально)</label>
                        <input type="text" id="userId" placeholder="1">
                    </div>
                    <div class="setting-item">
                        <label>API URL</label>
                        <input type="text" id="apiUrl" value="https://techsovet-api-production.up.railway.app">
                    </div>
                </div>
            </details>
        </div>
    </div>

    <script>
        const chatContainer = document.getElementById('chatContainer');
        const messageInput = document.getElementById('messageInput');
        const sendButton = document.getElementById('sendButton');
        const apiUrlInput = document.getElementById('apiUrl');
        const userIdInput = document.getElementById('userId');
        const responseModeSelect = document.getElementById('responseMode');

        // Загрузка настроек из localStorage
        function loadSettings() {
            const savedUrl = localStorage.getItem('techsovet_api_url');
            const savedUserId = localStorage.getItem('techsovet_user_id');
            const savedMode = localStorage.getItem('techsovet_response_mode');
            
            if (savedUrl) apiUrlInput.value = savedUrl;
            if (savedUserId) userIdInput.value = savedUserId;
            if (savedMode) responseModeSelect.value = savedMode;
        }

        // Сохранение настроек
        function saveSettings() {
            localStorage.setItem('techsovet_api_url', apiUrlInput.value);
            localStorage.setItem('techsovet_user_id', userIdInput.value);
            localStorage.setItem('techsovet_response_mode', responseModeSelect.value);
        }

        // Добавление сообщения в чат
        function addMessage(text, isUser = false, isError = false) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user' : 'ai'}`;
            
            const label = document.createElement('div');
            label.className = 'message-label';
            label.textContent = isUser ? '👤 Вы' : '🤖 ТехСовет';
            
            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';
            
            if (isError) {
                bubble.innerHTML = `<span style="color: #dc2626;">❌ ${text}</span>`;
            } else {
                bubble.textContent = text;
            }
            
            messageDiv.appendChild(label);
            messageDiv.appendChild(bubble);
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // Отправка запроса к API
        async function sendMessage(message) {
            const apiUrl = apiUrlInput.value.replace(/\/$/, ''); // Убираем слеш в конце
            const userId = userIdInput.value || 'web_user_' + Math.random().toString(36).substring(7);
            const responseMode = responseModeSelect.value;
            
            const payload = {
                message: message,
                user_id: userId,
                session_id: 'session_' + Date.now(),
                response_mode: responseMode,
                source: 'web'
            };

            try {
                const response = await fetch(`${apiUrl}/ask`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({}));
                    throw new Error(`HTTP ${response.status}: ${errorData.detail || response.statusText}`);
                }

                const data = await response.json();
                return data.result_text || 'Не удалось получить ответ';
                
            } catch (error) {
                console.error('Ошибка:', error);
                throw error;
            }
        }

        // Обработка отправки формы
        async function handleSubmit() {
            const message = messageInput.value.trim();
            if (!message) return;

            saveSettings();
            
            // Добавляем сообщение пользователя
            addMessage(message, true);
            messageInput.value = '';
            messageInput.style.height = 'auto';

            // Блокируем кнопку
            sendButton.disabled = true;
            sendButton.innerHTML = '<span class="loading"></span>';

            try {
                const response = await sendMessage(message);
                addMessage(response, false);
            } catch (error) {
                addMessage(`Ошибка соединения с API: ${error.message}`, false, true);
            } finally {
                sendButton.disabled = false;
                sendButton.textContent = '🚀 Отправить';
                messageInput.focus();
            }
        }

        // Обработчики событий
        sendButton.addEventListener('click', handleSubmit);

        messageInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleSubmit();
            }
        });

        // Инициализация
        loadSettings();
        messageInput.focus();
    </script>
</body>
</html>
